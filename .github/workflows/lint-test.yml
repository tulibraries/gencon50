name: Lint and Test

permissions:
  contents: read

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch: {}

env:
  RAILS_ENV: test
  SOLR_URL: "http://localhost:8090/solr/gencon50-1.0/"

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        ruby-version: ["3.4"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true

    - name: Run Rubocop
      run: bundle exec rubocop

    - name: Run Brakeman
      run: bundle exec brakeman --no-pager --no-threads

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        ruby-version: ["3.4"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "26"
        cache: "yarn"

    - name: Install JavaScript dependencies
      run: bundle exec yarn install --frozen-lockfile

    - name: Precompile assets
      run: bin/rails assets:precompile

    - name: Setup database
      run: bundle exec rake db:setup

    - name: Run tests
      run: bundle exec rspec spec
